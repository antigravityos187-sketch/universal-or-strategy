# [BUILD 948] CodeQL Security Analysis
# NinjaScript C# files are partial classes that depend on proprietary NinjaTrader
# assemblies not available on GitHub runners. The build step is therefore
# non-blocking (continue-on-error). CodeQL will still scan and report any
# security findings it can extract from the source AST without a full compile.
# The .NET Desktop Build workflow is the primary compile gate for this project.

name: "CodeQL Security Scan"

on:
  push:
    branches: ["main", "build/**"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:00 UTC (weekly background audit)
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: windows-latest
    # Non-blocking: CodeQL cannot compile NinjaScript without NinjaTrader DLLs.
    # The .NET Desktop Build workflow is the authoritative compile gate.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          config: |
            paths:
              - src/

      - name: Build C# Strategy (AutoBuild)
        uses: github/codeql-action/autobuild@v3
        # NinjaScript requires NinjaTrader8 assemblies not available on GitHub runners.
        # AutoBuild will fail gracefully; analysis still runs on any parseable source.
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
