---
engines:
  # Roslyn Analyzer (C# static analysis)
  roslyn:
    enabled: true
    
  # Duplication detection
  duplication:
    enabled: true
    exclude_paths:
      - "tests/**"
      - "benchmarks/**"

# GODMODE: Jane Street Strict Threshold (CYC ≤ 8)
# Autonomous "Bob the God" configuration - zero tolerance for complexity
# All code must meet Jane Street's microsecond-latency reasoning standard
# Rationale: docs/standards/COMPLEXITY_RATIONALE.md
complexity:
  threshold: 8

# Exclude non-source files
exclude_paths:
  - "docs/**"
  - "scripts/**"
  - ".github/**"
  - "conductor/**"
  - "Traycerrefactor/**"
  - ".bob/**"
  - ".codex/**"
  - ".cursor/**"
  - ".gemini/**"
  - "artifacts/**"

# Jane Street Rule Mapping (JS-### → Codacy Patterns)
# Full catalog: docs/standards/jane-street/RULES_CATALOG.md

# Type Safety Rules:
# - JS-002 (Null Usage) → Codacy: NullReferenceException, NullableReferenceTypes
# - JS-005 (Nullable Types) → Codacy: NullableReferenceTypes

# Concurrency Rules:
# - JS-021 (Lock Usage) → Codacy: ThreadSafety, DeadlockDetection
# - JS-033 (Async Void) → Codacy: AsyncVoidMethod

# Performance Rules:
# - JS-042 (Magic Numbers) → Codacy: MagicNumber
# - JS-040 (Readonly Struct) → Codacy: StructLayoutOptimization

# Code Review Rules:
# - JS-067 (Complexity) → Codacy: CyclomaticComplexity (threshold: 8 STRICT)
# - JS-070 (ASCII-only) → Custom validation (scripts/jane_street_validator.py)

# Testing Rules:
# - JS-055 (Benchmarks) → Manual review (no Codacy pattern)

# Note: Some JS-### rules require custom validation scripts
# See: scripts/jane_street_validator.py, scripts/jane_street_rule_checker.py
# Pre-push validation: scripts/pre_push_validation.ps1 (Check #15, #16, #17)

# SRC-ONLY ENFORCEMENT (epic-ccn-* branches):
# - epic-ccn-* branches MUST only modify .cs files in src/
# - Enforced by: pre-commit hook, pre-push validation (Check #17), GitHub Actions
# - Rationale: Surgical refactoring - separate concerns, prevent scope creep
# - See: docs/protocol/BRANCH_STRATEGY.md

# Jane Street Deviations (Intentional Suppressions)
# Full documentation: docs/standards/JANE_STREET_DEVIATIONS.md
