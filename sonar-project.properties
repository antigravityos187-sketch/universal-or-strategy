# SonarCloud Full-Pass Review Configuration
# V12 Universal OR Strategy - Unified 5/5 Scoring
# Protocol: SonarCloud reviews EVERYTHING, not just maintainability

# Project Identification
sonar.projectKey=universal-or-strategy
sonar.organization=wsgta

# Source Configuration
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Language Configuration
sonar.language=cs
sonar.cs.version=12.0

# Exclusions
sonar.exclusions=\
  **/*.Designer.cs,\
  **/*.g.cs,\
  **/*.generated.cs,\
  **/obj/**,\
  **/bin/**,\
  **/.vs/**,\
  **/packages/**

# Full-Pass Quality Gate (ALL dimensions)
# BANNED: Maintainability-only gate
# REQUIRED: Holistic quality gate covering all 5 dimensions

# Security Dimension (20% weight)
sonar.security.hotspots.enabled=true
sonar.security.review.rating=A
sonar.security.rating=1

# Code Quality Dimension (20% weight)
sonar.maintainability.rating=A
sonar.code_smells.threshold=0
sonar.sqale.rating=A

# Testing Dimension (20% weight)
sonar.coverage.exclusions=**/*Tests.cs,**/*Test.cs
sonar.coverage.minimum=80
sonar.tests.coverage=80

# Performance Dimension (20% weight)
# Note: SonarCloud doesn't have explicit performance metrics
# We approximate via complexity and code smells
sonar.complexity.threshold=15

# Standards Dimension (20% weight)
sonar.issue.ignore.multicriteria=e1,e2,e3

# Complexity Rules (V12 DNA: CYC ≤ 15)
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S1541
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.cs

# Cognitive Complexity
sonar.cs.cognitive.complexity.threshold=15

# Quality Gate Definition
# Overall: Must pass ALL 5 dimensions to achieve 5/5
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Custom Quality Gate Conditions
# Security: No vulnerabilities, no security hotspots
sonar.qualitygate.conditions.security.vulnerabilities=0
sonar.qualitygate.conditions.security.hotspots=0

# Code Quality: A rating, <5% code smells
sonar.qualitygate.conditions.maintainability.rating=A
sonar.qualitygate.conditions.maintainability.debt_ratio=5

# Testing: ≥80% coverage
sonar.qualitygate.conditions.coverage=80

# Performance: Complexity ≤15 (approximated via maintainability)
sonar.qualitygate.conditions.complexity=15

# Standards: No blocker/critical issues
sonar.qualitygate.conditions.blocker_violations=0
sonar.qualitygate.conditions.critical_violations=0

# Scoring Output Template
# SonarCloud doesn't support custom templates directly
# Use webhook/API to transform to unified format:
# Overall Score: X/5 ⭐⭐⭐⭐⭐
# - Security: X/5
# - Code Quality: X/5
# - Testing: X/5
# - Performance: X/5
# - Standards: X/5

# Analysis Parameters
sonar.analysis.mode=publish
sonar.verbose=false
sonar.log.level=INFO

# Branch Analysis
sonar.branch.name=${BRANCH_NAME}
sonar.pullrequest.key=${PR_NUMBER}
sonar.pullrequest.branch=${PR_BRANCH}
sonar.pullrequest.base=${PR_BASE}

# Integration
sonar.links.homepage=https://github.com/wsgta/universal-or-strategy
sonar.links.ci=https://github.com/wsgta/universal-or-strategy/actions
sonar.links.issue=https://github.com/wsgta/universal-or-strategy/issues